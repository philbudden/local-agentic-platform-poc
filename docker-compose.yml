services:

  ingress:
    build: .
    container_name: ingress
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - CLASSIFIER_MODEL=${CLASSIFIER_MODEL:-llama3.2:3b}
      - WORKER_MODEL=${WORKER_MODEL:-llama3.2:3b}
      - CLASSIFIER_TIMEOUT=${CLASSIFIER_TIMEOUT:-60}
      - WORKER_TIMEOUT=${WORKER_TIMEOUT:-300}
      - MAX_TOKENS=${MAX_TOKENS:-256}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - DEBUG_ROUTER=${DEBUG_ROUTER:-false}
    volumes:
      # Mount host /tmp read-only so the read_file tool can access files created
      # on the host (e.g. /tmp/cortx_test.txt from the testing guide).
      - /tmp:/tmp:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - agentic
    restart: unless-stopped

  openwebui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: openwebui
    ports:
      - "3000:8080"
    environment:
      - OPENAI_API_BASE_URL=http://ingress:8000/v1
      - OPENAI_API_KEY=not-used
      - ENABLE_OLLAMA_API=false
      - CORS_ALLOW_ORIGIN=http://localhost:3000
    depends_on:
      - ingress
    networks:
      - agentic
    restart: unless-stopped
    volumes:
      - openwebui_data:/app/backend/data

volumes:
  openwebui_data:

networks:
  agentic:
    driver: bridge
